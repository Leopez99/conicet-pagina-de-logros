<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciencia Argentina · CONICET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <p class="kicker">CONICET · Argentina</p>
  <h1>Ciencia Argentina</h1>
  <p class="subtitle">Logros y descubrimientos científicos nacionales</p>
</header>

<div class="controls">
  <div class="year-filters" id="yearFilters">
    <button class="year-btn active" data-year="all">Todos</button>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
    <span class="spin" id="spinIcon">↻</span> Actualizar
  </button>
</div>

<div class="meta-bar">
  <span class="count" id="countLabel"></span>
  <span class="last-updated" id="lastUpdated"></span>
</div>

<div id="errorBox"></div>
<main id="mainContent"></main>

<script src="app.js"></script>
</body>
</html>
